<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Payne Clicker</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #111119);
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Área Principal del Juego */
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .counter {
            font-size: 3rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 210, 0.5);
            margin-bottom: 30px;
        }

        /* Contenedor de la imagen con efecto de clic */
        .click-target-container {
            position: relative;
            cursor: pointer;
        }

        .click-target {
            max-width: 100%;
            max-height: 250px;
            border-radius: 0;
            object-fit: contain;
            border: none;
            box-shadow: none;
            transition: transform 0.05s ease;
  
        }

        .click-target:active {
            transform: scale(0.92);
        }

        /* Números flotantes (+1) */
        .floating-text {
            position: absolute;
            color: #00ffcc;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.2);
            }
        }

        /* Panel Lateral de Logros */
        .achievements-sidebar {
            width: 350px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .achievements-sidebar h2 {
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid #00ffcc;
            padding-bottom: 10px;
            color: #00ffcc;
        }

        .achievement-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .achievement-card.unlocked {
            opacity: 1;
            border-color: #00ffcc;
            background: rgba(0, 255, 210, 0.05);
            box-shadow: 0 0 10px rgba(0, 255, 210, 0.1);
        }

        .achievement-icon {
            font-size: 2rem;
        }

        .achievement-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }

        .achievement-info p {
            margin: 0;
            font-size: 0.85rem;
            color: #aaa;
        }

        /* Notificación emergente (Toast) */
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ffcc;
            color: #111;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,255,210,0.4);
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .toast.show {
            bottom: 30px;
        }

        /* Botón de reinicio */
        .reset-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .reset-btn:hover {
            color: #ff4c4c;
            border-color: #ff4c4c;
        }
    </style>
</head>
<body>

    <!-- Contenedor del Juego -->
    <div class="game-container">
        <h1>Tim Payne Clicker</h1>
        <div class="counter" id="clicks-display">0</div>
        
        <div class="click-target-container" id="target-container">
            <!-- REEMPLAZA "tim_payne.png" CON LA RUTA DE TU IMAGEN -->
            <img src="https://wellingtonphoenix.com/wp-content/uploads/sites/11/2019/08/No.-6_TimPayne_headshot-e1759882643262.png" alt="Tim Payne" class="click-target" id="click-btn">
        </div>

        <button class="reset-btn" id="reset-btn">Reiniciar Progreso</button>
    </div>

    <!-- Barra lateral de Logros -->
    <div class="achievements-sidebar">
        <h2>Logros</h2>
        <div id="achievements-list"></div>
    </div>

    <!-- Alerta de logro desbloqueado -->
    <div class="toast" id="toast">¡Logro desbloqueado!</div>

    <script>
        // --- CONFIGURACIÓN DEL JUEGO ---
        let clicks = 0;

        // Lista extendida de logros hasta el 1,000,000 de clics
        const achievements = [
            { id: 1, req: 1, title: "El Primer Toque", desc: "Hiciste clic en Tim Payne por primera vez.", icon: "⚽", unlocked: false },
            { id: 2, req: 10, title: "Calentamiento", desc: "Llegaste a 10 clics.", icon: "🏃‍♂️", unlocked: false },
            { id: 3, req: 50, title: "Aficionado", desc: "Llegaste a 50 clics.", icon: "👟", unlocked: false },
            { id: 4, req: 100, title: "Titular Indiscutible", desc: "¡100 clics alcanzados!", icon: "🏆", unlocked: false },
            { id: 5, req: 500, title: "Leyenda del Club", desc: "Has presionado 500 veces.", icon: "🌟", unlocked: false },
            { id: 6, req: 1000, title: "Modo Dios", desc: "1,000 clics. Tu dedo es de acero.", icon: "👑", unlocked: false },
            { id: 7, req: 5000, title: "Muralla Defensiva", desc: "Alcanzaste los 5,000 clics.", icon: "🛡️", unlocked: false },
            { id: 8, req: 10000, title: "Crack de la Liga", desc: "¡Imparable! Llegaste a 10,000 clics.", icon: "⚡", unlocked: false },
            { id: 9, req: 50000, title: "Fiebre de Clics", desc: "50,000 clics acumulados. ¿Todo bien en casa?", icon: "🔥", unlocked: false },
            { id: 10, req: 100000, title: "Centurión Histórico", desc: "¡Cruzas la enorme barrera de los 100,000 clics!", icon: "💯", unlocked: false },
            { id: 11, req: 500000, title: "Ídolo de Multitudes", desc: "Increíbles 500,000 clics. Tu constancia no tiene límites.", icon: "🌍", unlocked: false },
            { id: 12, req: 1000000, title: "El Tim Payne de Oro", desc: "1,000,000 DE CLICS. Eres una deidad absoluta de este juego.", icon: "💎", unlocked: false }
        ];

        // Elementos del DOM
        const clicksDisplay = document.getElementById('clicks-display');
        const clickBtn = document.getElementById('click-btn');
        const targetContainer = document.getElementById('target-container');
        const achievementsList = document.getElementById('achievements-list');
        const toast = document.getElementById('toast');
        const resetBtn = document.getElementById('reset-btn');

        // --- FUNCIONES ---

        // Cargar datos guardados
        function loadGame() {
            const savedClicks = localStorage.getItem('timPayneClicks');
            if (savedClicks !== null) {
                clicks = parseInt(savedClicks, 10);
            }
            
            // Verificar qué logros ya estaban desbloqueados
            achievements.forEach(ach => {
                if (clicks >= ach.req) {
                    ach.unlocked = true;
                }
            });
            
            updateDisplay();
            renderAchievements();
        }

        // Guardar datos
        function saveGame() {
            localStorage.setItem('timPayneClicks', clicks);
        }

        // Renderizar la lista de logros en la barra lateral
        function renderAchievements() {
            achievementsList.innerHTML = '';
            achievements.forEach(ach => {
                const card = document.createElement('div');
                card.className = `achievement-card ${ach.unlocked ? 'unlocked' : ''}`;
                card.innerHTML = `
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-info">
                        <h3>${ach.title}</h3>
                        <p>${ach.desc} (Req: ${ach.req})</p>
                    </div>
                `;
                achievementsList.appendChild(card);
            });
        }

        // Actualizar el contador en pantalla
        function updateDisplay() {
            clicksDisplay.textContent = clicks.toLocaleString();
        }

        // Mostrar notificación de logro
        function showToast(title) {
            toast.textContent = `🏆 ¡Logro Desbloqueado!: ${title}`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Verificar si se desbloqueó algún logro nuevo
        function checkAchievements() {
            achievements.forEach(ach => {
                if (!ach.unlocked && clicks >= ach.req) {
                    ach.unlocked = true;
                    renderAchievements();
                    showToast(ach.title);
                }
            });
        }

        // Crear el efecto de número flotante (+1)
        function createFloatingText(e) {
            const rect = clickBtn.getBoundingClientRect();
            // Calcular posición relativa al contenedor
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const text = document.createElement('span');
            text.className = 'floating-text';
            text.textContent = '+1';
            text.style.left = `${x}px`;
            text.style.top = `${y}px`;

            targetContainer.appendChild(text);

            // Eliminar el elemento después de que termine la animación
            setTimeout(() => {
                text.remove();
            }, 600);
        }

        // --- EVENTOS ---

        // Evento principal de clic
        clickBtn.addEventListener('click', (e) => {
            clicks++;
            updateDisplay();
            createFloatingText(e);
            checkAchievements();
            saveGame();
        });

        // Evento para reiniciar el juego
        resetBtn.addEventListener('click', () => {
            if (confirm('¿Seguro que quieres reiniciar todo tu progreso?')) {
                clicks = 0;
                achievements.forEach(ach => ach.unlocked = false);
                saveGame();
                updateDisplay();
                renderAchievements();
            }
        });

        // Inicializar juego al cargar la página
        loadGame();
    </script>
</body>
</html>
