<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Payne Clicker</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #111119);
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Área Principal del Juego */
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        /* Selector de Idioma Arriba a la Izquierda */
        .language-selector {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.2s;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .lang-btn.active {
            color: #00ffcc;
            text-shadow: 0 0 8px rgba(0, 255, 210, 0.4);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .counter {
            font-size: 3rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 210, 0.5);
            margin-bottom: 30px;
        }

        /* Contenedor de la imagen centrado y adaptado */
        .click-target-container {
            position: relative;
            cursor: pointer;
        }

        .click-target {
            max-width: 100%;
            max-height: 250px;
            border-radius: 0;
            object-fit: contain;
            border: none;
            box-shadow: none;
            transition: transform 0.05s ease;
        }

        .click-target:active {
            transform: scale(0.92);
        }

        /* Números flotantes (+1) */
        .floating-text {
            position: absolute;
            color: #00ffcc;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.2);
            }
        }

        /* Panel Lateral de Logros */
        .achievements-sidebar {
            width: 350px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .achievements-sidebar h2 {
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid #00ffcc;
            padding-bottom: 10px;
            color: #00ffcc;
        }

        .achievement-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .achievement-card.unlocked {
            opacity: 1;
            border-color: #00ffcc;
            background: rgba(0, 255, 210, 0.05);
            box-shadow: 0 0 10px rgba(0, 255, 210, 0.1);
        }

        .achievement-icon {
            font-size: 2rem;
        }

        .achievement-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }

        .achievement-info p {
            margin: 0;
            font-size: 0.85rem;
            color: #aaa;
        }

        /* Notificación emergente (Toast) */
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ffcc;
            color: #111;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,255,210,0.4);
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .toast.show {
            bottom: 30px;
        }

        /* Botón de reinicio abajo a la izquierda */
        .reset-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .reset-btn:hover {
            color: #ff4c4c;
            border-color: #ff4c4c;
        }
    </style>
</head>
<body>

    <!-- Contenedor del Juego -->
    <div class="game-container">
        <!-- Selector de Idioma -->
        <div class="language-selector">
            <button class="lang-btn active" id="btn-es" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
        </div>

        <h1 id="game-title">Tim Payne Clicker</h1>
        <div class="counter" id="clicks-display">0</div>
        
        <div class="click-target-container" id="target-container">
            <img src="https://wellingtonphoenix.com/wp-content/uploads/sites/11/2019/08/No.-6_TimPayne_headshot-e1759882643262.png" alt="Tim Payne" class="click-target" id="click-btn">
        </div>

        <button class="reset-btn" id="reset-btn">Reiniciar Progreso</button>
    </div>

    <!-- Barra lateral de Logros -->
    <div class="achievements-sidebar">
        <h2 id="sidebar-title">Logros</h2>
        <div id="achievements-list"></div>
    </div>

    <!-- Alerta de logro desbloqueado -->
    <div class="toast" id="toast">¡Logro desbloqueado!</div>

    <script>
        // --- VARIABLES DEL JUEGO ---
        let clicks = 0;
        let currentLang = 'es';

        // Diccionario de traducciones de la interfaz
        const uiTranslations = {
            es: {
                title: "Tim Payne Clicker",
                achievements: "Logros",
                resetBtn: "Reiniciar Progreso",
                resetConfirm: "¿Seguro que quieres reiniciar todo tu progreso?",
                toastUnlocked: "¡Logro Desbloqueado!"
            },
            en: {
                title: "Tim Payne Clicker",
                achievements: "Achievements",
                resetBtn: "Reset Progress",
                resetConfirm: "Are you sure you want to reset all your progress?",
                toastUnlocked: "Achievement Unlocked!"
            }
        };

        // Lista de logros bilingüe
        const achievementsData = [
            { id: 1, req: 1, icon: "⚽", titles: { es: "El Primer Toque", en: "First Touch" }, descs: { es: "Hiciste clic en Tim Payne por primera vez.", en: "Clicked Tim Payne for the first time." }, unlocked: false },
            { id: 2, req: 10, icon: "🏃‍♂️", titles: { es: "Calentamiento", en: "Warm Up" }, descs: { es: "Llegaste a 10 clics.", en: "Reached 10 clicks." }, unlocked: false },
            { id: 3, req: 50, icon: "👟", titles: { es: "Aficionado", en: "Amateur" }, descs: { es: "Llegaste a 50 clics.", en: "Reached 50 clicks." }, unlocked: false },
            { id: 4, req: 100, icon: "🏆", titles: { es: "Titular Indiscutible", en: "Undisputed Starter" }, descs: { es: "¡100 clics alcanzados!", en: "100 clicks reached!" }, unlocked: false },
            { id: 5, req: 500, icon: "🌟", titles: { es: "Leyenda del Club", en: "Club Legend" }, descs: { es: "Has presionado 500 veces.", en: "You have pressed 500 times." }, unlocked: false },
            { id: 6, req: 1000, icon: "👑", titles: { es: "Modo Dios", en: "God Mode" }, descs: { es: "1,000 clics. Tu dedo es de acero.", en: "1,000 clicks. Your finger is made of steel." }, unlocked: false },
            { id: 7, req: 5000, icon: "🛡️", titles: { es: "Muralla Defensiva", en: "Defensive Wall" }, descs: { es: "Alcanzaste los 5,000 clics.", en: "Reached 5,000 clicks." }, unlocked: false },
            { id: 8, req: 10000, icon: "⚡", titles: { es: "Crack de la Liga", en: "League Star" }, descs: { es: "¡Imparable! Llegaste a 10,000 clics.", en: "Unstoppable! You reached 10,000 clicks." }, unlocked: false },
            { id: 9, req: 50000, icon: "🔥", titles: { es: "Fiebre de Clics", en: "Click Fever" }, descs: { es: "50,000 clics acumulados. ¿Todo bien en casa?", en: "50,000 accumulated clicks. Everything fine at home?" }, unlocked: false },
            { id: 10, req: 100000, icon: "💯", titles: { es: "Centurión Histórico", en: "Historic Centurion" }, descs: { es: "¡Cruzas la enorme barrera de los 100,000 clics!", en: "You cross the massive 100,000 clicks barrier!" }, unlocked: false },
            { id: 11, req: 500000, icon: "🌍", titles: { es: "Ídolo de Multitudes", en: "Fan Favorite" }, descs: { es: "Increíbles 500,000 clics. Tu constancia no tiene límites.", en: "Incredible 500,000 clicks. Your dedication has no limits." }, unlocked: false },
            { id: 12, req: 1000000, icon: "💎", titles: { es: "El Tim Payne de Oro", en: "Golden Tim Payne" }, descs: { es: "1,000,000 DE CLICS. Eres una deidad absoluta de este juego.", en: "1,000,000 CLICKS. You are an absolute deity of this game." }, unlocked: false }
        ];

        // Elementos del DOM
        const clicksDisplay = document.getElementById('clicks-display');
        const clickBtn = document.getElementById('click-btn');
        const targetContainer = document.getElementById('target-container');
        const achievementsList = document.getElementById('achievements-list');
        const toast = document.getElementById('toast');
        const resetBtn = document.getElementById('reset-btn');
        const gameTitle = document.getElementById('game-title');
        const sidebarTitle = document.getElementById('sidebar-title');

        // --- FUNCIONES ---

        function loadGame() {
            const savedClicks = localStorage.getItem('timPayneClicks');
            if (savedClicks !== null) clicks = parseInt(savedClicks, 10);
            
            const savedLang = localStorage.getItem('timPayneLang');
            if (savedLang !== null) currentLang = savedLang;

            achievementsData.forEach(ach => {
                if (clicks >= ach.req) ach.unlocked = true;
            });
            
            updateDisplay();
            updateLanguageUI();
        }

        function saveGame() {
            localStorage.setItem('timPayneClicks', clicks);
            localStorage.setItem('timPayneLang', currentLang);
        }

        // Cambiar el idioma de forma dinámica
        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            updateLanguageUI();
            saveGame();
        }

        // Actualizar todos los textos visibles
        function updateLanguageUI() {
            gameTitle.textContent = uiTranslations[currentLang].title;
            sidebarTitle.textContent = uiTranslations[currentLang].achievements;
            resetBtn.textContent = uiTranslations[currentLang].resetBtn;
            renderAchievements();
        }

        function renderAchievements() {
            achievementsList.innerHTML = '';
            achievementsData.forEach(ach => {
                const card = document.createElement('div');
                card.className = `achievement-card ${ach.unlocked ? 'unlocked' : ''}`;
                card.innerHTML = `
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-info">
                        <h3>${ach.titles[currentLang]}</h3>
                        <p>${ach.descs[currentLang]} (Req: ${ach.req})</p>
                    </div>
                `;
                achievementsList.appendChild(card);
            });
        }

        function updateDisplay() {
            clicksDisplay.textContent = clicks.toLocaleString();
        }

        function showToast(title) {
            toast.textContent = `🏆 ${uiTranslations[currentLang].toastUnlocked}: ${title}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function checkAchievements() {
            achievementsData.forEach(ach => {
                if (!ach.unlocked && clicks >= ach.req) {
                    ach.unlocked = true;
                    renderAchievements();
                    showToast(ach.titles[currentLang]);
                }
            });
        }

        function createFloatingText(e) {
            const rect = clickBtn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const text = document.createElement('span');
            text.className = 'floating-text';
            text.textContent = '+1';
            text.style.left = `${x}px`;
            text.style.top = `${y}px`;

            targetContainer.appendChild(text);
            setTimeout(() => text.remove(), 600);
        }

        // --- EVENTOS ---

        clickBtn.addEventListener('click', (e) => {
            clicks++;
            updateDisplay();
            createFloatingText(e);
            checkAchievements();
            saveGame();
        });

        resetBtn.addEventListener('click', () => {
            if (confirm(uiTranslations[currentLang].resetConfirm)) {
                clicks = 0;
                achievementsData.forEach(ach => ach.unlocked = false);
                saveGame();
                updateDisplay();
                renderAchievements();
            }
        });

        loadGame();
    </script>
</body>
</html>
